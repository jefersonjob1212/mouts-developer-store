<div class="sale-item" [formGroup]="group">
    <mat-form-field appearance="outline" class="product">
        <mat-label>Product</mat-label>
        <input
            matInput
            [formControl]="productSearchControl"
            [matAutocomplete]="productAuto">
        <mat-autocomplete
            #productAuto="matAutocomplete"
            [displayWith]="displayProduct"
            (optionSelected)="onProductSelected($event)">
            @for(product of (filteredProducts$ | async); track product.id){
                <mat-option
                    [value]="product">
                    <div class="product-option">
                        <span class="code">
                            {{ product.code }}
                        </span>
                        <span class="name">
                            {{ product.name }}
                        </span>
                    </div>
                </mat-option>
            }
        </mat-autocomplete>
    </mat-form-field>
    <mat-form-field appearance="outline" class="quantity">
        <mat-label>Quantity</mat-label>
        <input
            matInput
            type="number"
            min="1"
            formControlName="quantity">
    </mat-form-field>
    <mat-form-field appearance="outline" class="price">
        <mat-label>Unit Price</mat-label>
        <input
            matInput
            readonly
            formControlName="unitPrice">
    </mat-form-field>
    <mat-form-field appearance="outline" class="discount">
        <mat-label>Discount</mat-label>
        <input
            matInput
            readonly
            formControlName="discount">
    </mat-form-field>
    <mat-form-field appearance="outline" class="total">
        <mat-label>Subtotal</mat-label>
        <input
            matInput
            readonly
            formControlName="total">
    </mat-form-field>
    <button
        mat-icon-button
        color="warn"
        type="button"
        (click)="removeItem()">
        <mat-icon>delete</mat-icon>
    </button>
</div>
