<form [formGroup]="filterForm" (ngSubmit)="onSubmit()">
    <div class="filter-container">
        <mat-form-field appearance="outline">
            <mat-label>Number</mat-label>
            <input matInput type="text" formControlName="number" placeholder="Enter sale number">
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Client</mat-label>
            <input type="text" matInput [formControl]="clientSearchControl" [matAutocomplete]="clientAutocomplete"
                placeholder="Search for a client">
            <mat-autocomplete #clientAutocomplete="matAutocomplete" [displayWith]="displayClient">
                @for (client of (filteredClients$ | async); track client.id) {
                <mat-option [value]="client">
                    {{ client.name ? client.name : client.legalName }}
                </mat-option>
                }
            </mat-autocomplete>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Subsidiary</mat-label>
            <input type="text" matInput [formControl]="subsidiarySearchControl"
                [matAutocomplete]="subsidiaryAutocomplete" placeholder="Search for a subsidiary">
            <mat-autocomplete #subsidiaryAutocomplete="matAutocomplete" [displayWith]="displaySubsidiary">
                @for (subsidiary of (filteredSubsidiaries$ | async); track subsidiary.id) {
                <mat-option [value]="subsidiary">
                    {{ subsidiary.tradeName ? subsidiary.tradeName : subsidiary.legalName }}
                </mat-option>
                }
            </mat-autocomplete>
        </mat-form-field>
        <button mat-raised-button type="submit" color="primary">Filter</button>
    </div>

</form>
