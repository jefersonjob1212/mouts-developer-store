<h2 mat-dialog-title>Confirm Cancel</h2>
<mat-dialog-content>
  <p>Are you sure cancel this sale?</p>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onNoClick()">No</button>
  <button mat-button [mat-dialog-close]="cancel()" cdkFocusInitial>Yes</button>
</mat-dialog-actions>
